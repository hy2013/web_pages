<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: ambientPulse 8s ease-in-out infinite;
        }
        .ambient-light-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4), transparent 70%);
            animation-delay: 0s;
        }
        .ambient-light-2 {
            width: 300px;
            height: 300px;
            top: 30%;
            left: -100px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent 70%);
            animation-delay: -2s;
        }
        .ambient-light-3 {
            width: 350px;
            height: 350px;
            top: 50%;
            right: -120px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.25), transparent 70%);
            animation-delay: -4s;
        }
        .ambient-light-4 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            left: 20%;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.2), transparent 70%);
            animation-delay: -6s;
        }
        @keyframes ambientPulse {
            0%, 100% { 
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            50% { 
                opacity: 0.8;
                transform: translateX(-50%) scale(1.1);
            }
        }
        @keyframes ambientFloat {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(20px, -15px); }
            66% { transform: translate(-15px, 10px); }
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% 0%, rgba(120, 119, 198, 0.3), transparent),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 50% 30% at 20% 80%, rgba(139, 92, 246, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }
        @keyframes subtleFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, 2%); }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (prefers-reduced-transparency: reduce) {
            .app-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
            }
            .app-card::before,
            .app-card::after {
                display: none;
            }
        }
        .app-card {
            background: 
                linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.18)),
                rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%) contrast(1.1);
            -webkit-backdrop-filter: blur(20px) saturate(180%) contrast(1.1);
            border-radius: 24px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.15),
                0 2px 8px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.35);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease backwards;
            min-height: 130px;
        }
        .app-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                radial-gradient(circle at 30% 0%, rgba(255, 255, 255, 0.5), transparent 50%),
                radial-gradient(circle at 70% 100%, rgba(255, 255, 255, 0.2), transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        .app-card::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 23px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 1;
        }
        .app-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: 
                linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.12)),
                rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.18),
                0 4px 12px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.5),
                inset 0 -1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.35);
        }
        .app-card:hover::before {
            background:
                radial-gradient(circle at 30% 0%, rgba(255, 255, 255, 0.65), transparent 55%),
                radial-gradient(circle at 70% 100%, rgba(255, 255, 255, 0.3), transparent 45%);
        }
        .app-card:hover::after {
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }
        @keyframes liquidShine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .app-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .app-card:hover .app-icon {
            transform: scale(1.1);
        }
        .app-name {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 2;
        }
        .app-desc {
            font-size: 11px;
            color: #334155;
            margin-top: 4px;
            font-weight: 500;
            position: relative;
            z-index: 2;
        }
        .header {
            color: white;
            text-align: center;
            padding: 40px 12px 32px;
            position: relative;
            z-index: 1;
        }
        .header h1 {
            font-size: 28px;
            margin: 0 0 12px;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.85) 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
        .header p {
            font-size: 15px;
            opacity: 0.75;
            margin: 0;
            font-weight: 400;
            letter-spacing: 0.03em;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(199, 210, 254, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .grid-container {
            padding: 12px 16px 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            justify-items: stretch;
            align-items: stretch;
        }
        @media (min-width: 400px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
            }
            .app-card {
                padding: 16px 12px;
                min-height: 140px;
            }
            .app-icon {
                width: 62px;
                height: 62px;
                font-size: 28px;
                margin-bottom: 12px;
            }
            .app-name {
                font-size: 14px;
            }
            .app-desc {
                font-size: 12px;
            }
            .header h1 {
                font-size: 32px;
            }
            .header p {
                font-size: 16px;
            }
        }
        @media (min-width: 550px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }
            .app-card {
                padding: 18px 14px;
                min-height: 150px;
            }
            .app-icon {
                width: 64px;
                height: 64px;
                font-size: 30px;
                margin-bottom: 12px;
            }
            .icon-deepseek,
            .icon-zhipu,
            .icon-yuanbao,
            .icon-kimi {
                background-size: 44px 44px;
            }
            .icon-zhipu {
                background-size: 36px 36px;
            }
        }
        @media (min-width: 700px) {
            .grid-container {
                grid-template-columns: repeat(5, 1fr);
                gap: 18px;
            }
            .app-card {
                padding: 20px 16px;
                min-height: 160px;
            }
            .app-icon {
                width: 68px;
                height: 68px;
                font-size: 32px;
                margin-bottom: 14px;
            }
            .icon-deepseek,
            .icon-zhipu,
            .icon-yuanbao,
            .icon-kimi {
                background-size: 48px 48px;
            }
            .icon-zhipu {
                background-size: 40px 40px;
            }
        }
        @media (min-width: 850px) {
            .grid-container {
                grid-template-columns: repeat(6, 1fr);
                gap: 20px;
            }
            .app-card {
                padding: 22px 18px;
                min-height: 170px;
            }
            .app-icon {
                width: 72px;
                height: 72px;
                font-size: 34px;
                margin-bottom: 14px;
            }
            .icon-deepseek,
            .icon-zhipu,
            .icon-yuanbao,
            .icon-kimi {
                background-size: 52px 52px;
            }
            .icon-zhipu {
                background-size: 44px 44px;
            }
        }
        @media (min-width: 1000px) {
            .grid-container {
                grid-template-columns: repeat(7, 1fr);
                gap: 22px;
            }
            .app-card {
                padding: 24px 20px;
                min-height: 180px;
            }
            .app-icon {
                width: 76px;
                height: 76px;
                font-size: 36px;
                margin-bottom: 16px;
            }
            .icon-deepseek,
            .icon-zhipu,
            .icon-yuanbao,
            .icon-kimi {
                background-size: 56px 56px;
            }
            .icon-zhipu {
                background-size: 48px 48px;
            }
        }
        @media (min-width: 1150px) {
            .grid-container {
                grid-template-columns: repeat(9, 1fr);
                gap: 24px;
                max-width: 1200px;
            }
            .app-card {
                padding: 26px 22px;
                min-height: 190px;
            }
            .app-icon {
                width: 80px;
                height: 80px;
                font-size: 38px;
                margin-bottom: 16px;
            }
            .icon-deepseek,
            .icon-zhipu,
            .icon-yuanbao,
            .icon-kimi {
                background-size: 60px 60px;
            }
            .icon-zhipu {
                background-size: 52px 52px;
            }
        }
        .icon-deepseek {
            background: #FFFFFF;
            background-image: url('https://www.deepseek.com/favicon.ico');
            background-size: 40px 40px;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .icon-doubao {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        .icon-tongyi {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .icon-xunfei {
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .icon-zhipu {
            background: #FFFFFF;
            background-image: url('https://chatglm.cn/img/icons/favicon-32x32.png');
            background-size: 32px 32px;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .icon-wenxin {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .icon-yuanbao {
            background: #FFFFFF;
            background-image: url('https://yuanbao.tencent.com/favicon.ico');
            background-size: 40px 40px;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .icon-kimi {
            background: #FFFFFF;
            background-image: url('https://kimi.moonshot.cn/favicon.ico');
            background-size: 40px 40px;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .icon-kouzi {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <div class="ambient-light ambient-light-1"></div>
    <div class="ambient-light ambient-light-2"></div>
    <div class="ambient-light ambient-light-3"></div>
    <div class="ambient-light ambient-light-4"></div>
    
    <div class="header">
        <h1>AI聊天助手</h1>
        <p>选择一个AI开始对话</p>
    </div>
    
    <div class="grid-container">
        <a href="https://chat.deepseek.com/" target="_blank" class="app-card">
            <div class="app-icon icon-deepseek"></div>
            <h3 class="app-name">DeepSeek</h3>
            <p class="app-desc">深度求索</p>
        </a>
        
        <a href="https://www.doubao.com/" target="_blank" class="app-card">
            <div class="app-icon icon-doubao">
                <span style="color: white;">豆</span>
            </div>
            <h3 class="app-name">豆包</h3>
            <p class="app-desc">字节跳动</p>
        </a>
        
        <a href="https://yuanbao.tencent.com/" target="_blank" class="app-card">
            <div class="app-icon icon-yuanbao"></div>
            <h3 class="app-name">元宝</h3>
            <p class="app-desc">腾讯</p>
        </a>
        
        <a href="https://kimi.moonshot.cn/" target="_blank" class="app-card">
            <div class="app-icon icon-kimi"></div>
            <h3 class="app-name">Kimi</h3>
            <p class="app-desc">Moonshot</p>
        </a>
        
        <a href="https://chatglm.cn/" target="_blank" class="app-card">
            <div class="app-icon icon-zhipu"></div>
            <h3 class="app-name">智谱清言</h3>
            <p class="app-desc">智谱AI</p>
        </a>
        
        <a href="https://www.coze.cn/" target="_blank" class="app-card">
            <div class="app-icon icon-kouzi">
                <span style="color: white;">扣</span>
            </div>
            <h3 class="app-name">扣子</h3>
            <p class="app-desc">字节跳动</p>
        </a>
        
        <a href="https://www.qianwen.com/?source=tongyigw" target="_blank" class="app-card">
            <div class="app-icon icon-tongyi">
                <span style="color: white;">千</span>
            </div>
            <h3 class="app-name">通义千问</h3>
            <p class="app-desc">阿里云</p>
        </a>
        
        <a href="https://yiyan.baidu.com/" target="_blank" class="app-card">
            <div class="app-icon icon-wenxin">
                <span style="color: white;">文</span>
            </div>
            <h3 class="app-name">文心一言</h3>
            <p class="app-desc">百度</p>
        </a>
        
        <a href="https://xinghuo.xfyun.cn/desk" target="_blank" class="app-card">
            <div class="app-icon icon-xunfei">
                <span style="color: white;">讯</span>
            </div>
            <h3 class="app-name">讯飞星火</h3>
            <p class="app-desc">科大讯飞</p>
        </a>
    </div>
</body>
</html>
