<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>滑雪大冒险</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #87CEEB 0%, #fff 50%, #e8e8e8 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.8); border: 2px solid #333; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #333; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.9); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #0066cc; margin-bottom: 15px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #0099ff 0%, #0066cc 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #fff; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">⛷️ 滑雪大冒险</div>
            <div class="subtitle">左右倾斜躲避树木<br>收集金币加分<br>撞树游戏结束</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, gameRunning = false;
        let player = { x: 0, y: 0, vx: 0 }, trees = [], coins = [], speed = 5;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; }
        function init() { resize(); player = { x: w/2, y: h * 0.3, vx: 0 }; trees = []; coins = []; score = 0; speed = 5; document.getElementById('score').textContent = 0; }

        function update() {
            if (!gameRunning) return;
            player.vx *= 0.95;
            player.x += player.vx * 2;
            if (player.x < 30) player.x = 30;
            if (player.x > w - 30) player.x = w - 30;
            if (Math.random() < 0.03) trees.push({ x: Math.random() * (w - 60) + 30, y: -30 });
            if (Math.random() < 0.02) coins.push({ x: Math.random() * (w - 60) + 30, y: -30 });
            trees.forEach((t, i) => { t.y += speed; if (Math.abs(player.x - t.x) < 25 && Math.abs(player.y - t.y) < 40) { gameOver(); } if (t.y > h + 50) trees.splice(i, 1); });
            coins.forEach((c, i) => { c.y += speed; if (Math.abs(player.x - c.x) < 25 && Math.abs(player.y - c.y) < 25) { score += 10; coins.splice(i, 1); document.getElementById('score').textContent = score; } if (c.y > h + 50) coins.splice(i, 1); });
            score++; speed += 0.001; document.getElementById('score').textContent = score;
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, h/2, w, h/2); trees.forEach(t => { ctx.fillStyle = '#8B4513'; ctx.fillRect(t.x-5, t.y, 10, 30); ctx.fillStyle = '#228B22'; ctx.beginPath(); ctx.moveTo(t.x, t.y-20); ctx.lineTo(t.x-20, t.y+10); ctx.lineTo(t.x+20, t.y+10); ctx.fill(); }); coins.forEach(c => { ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#FFA500'; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill(); }); ctx.fillStyle = '#ff0000'; ctx.fillRect(player.x-10, player.y-15, 20, 15); ctx.fillStyle = '#fff'; ctx.fillRect(player.x-8, player.y-12, 6, 8); ctx.fillRect(player.x+2, player.y-12, 6, 8); }

        function gameOver() { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } player.vx += (e.touches[0].clientX - w/2) * 0.01; });
        c.addEventListener('touchmove', e => { if (gameRunning) player.vx += (e.touches[0].clientX - w/2) * 0.005; });
        c.addEventListener('mousedown', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } });
        c.addEventListener('mousemove', e => { if (gameRunning) player.vx += (e.clientX - w/2) * 0.005; });
        init();
    </script>
</body>
</html>
