<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接金币</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #0f0f1a; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,215,0,0.2); border: 2px solid #ffd700; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #ffd700; font-size: 18px; font-weight: bold; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15,15,26,0.97); z-index: 20; }
        #gameOverScreen { display: none; }
        .title { font-size: 34px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px #ffd700; margin-bottom: 15px; }
        .subtitle { color: #88a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #ffd700 0%, #daa520 100%); border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; color: #000; border-radius: 25px; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .final-score { font-size: 22px; color: #fff; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box"><span>金币: <b id="score">0</b></span></div>
        </div>
        <div id="startScreen">
            <div class="title">💰 接金币</div>
            <div class="subtitle">左右移动接住金币<br>接到金币得分<br>漏掉3个游戏结束</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="final-score">获得金币: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, score = 0, missed = 0, gameRunning = false;
        let player, coins = [], bombs = [], particles = [], lastTime = 0, spawnTimer = 0;

        function resize() { const c = document.getElementById('gameContainer'); width = c.clientWidth; height = c.clientHeight; canvas.width = width; canvas.height = height; }
        function init() { resize(); window.addEventListener('resize', resize); player = { x: width/2, y: height - 80, w: 60, h: 40 }; coins = []; bombs = []; particles = []; score = 0; missed = 0; spawnTimer = 0; document.getElementById('score').textContent = 0; }
        function spawnCoin() { coins.push({ x: Math.random() * (width - 40) + 20, y: -30, vy: 2 + Math.random() * 2 + score * 0.005, size: 25 }); }
        function spawnBomb() { bombs.push({ x: Math.random() * (width - 40) + 20, y: -30, vy: 2.5 + Math.random() * 2, size: 25 }); }
        function createParticles(x, y, color) { for (let i = 0; i < 8; i++) { const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 3; particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color }); } }

        function update(t) {
            if (!gameRunning) return;
            if (t - lastTime > 100) { lastTime = t; return; }
            
            spawnTimer++;
            if (spawnTimer > 40) { spawnTimer = 0; if (Math.random() > 0.3) spawnCoin(); if (Math.random() > 0.7) spawnBomb(); }
            
            coins.forEach((c, i) => { c.y += c.vy; if (c.y > player.y - 10 && c.y < player.y + player.h && c.x > player.x - player.w/2 && c.x < player.x + player.w/2) { score += 10; createParticles(c.x, c.y, '#ffd700'); coins.splice(i, 1); document.getElementById('score').textContent = score; } else if (c.y > height + 30) { coins.splice(i, 1); missed++; if (missed >= 3) gameOver(); } });
            bombs.forEach((b, i) => { b.y += b.vy; if (b.y > player.y - 10 && b.y < player.y + player.h && b.x > player.x - player.w/2 && b.x < player.x + player.w/2) { score = Math.max(0, score - 20); createParticles(b.x, b.y, '#f00'); bombs.splice(i, 1); document.getElementById('score').textContent = score; } else if (b.y > height + 30) bombs.splice(i, 1); });
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; if (p.life <= 0) particles.splice(i, 1); });
            
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, width, height);
            coins.forEach(c => { ctx.font = c.size + 'px Arial'; ctx.textAlign = 'center'; ctx.fillText('💰', c.x, c.y); });
            bombs.forEach(b => { ctx.font = b.size + 'px Arial'; ctx.textAlign = 'center'; ctx.fillText('💣', b.x, b.y); });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1;
            ctx.font = '45px Arial'; ctx.textAlign = 'center'; ctx.fillText('🪙', player.x, player.y + 10);
        }

        function startGame() { document.getElementById('startScreen').style.display = 'none'; document.getElementById('gameOverScreen').style.display = 'none'; gameRunning = true; init(); lastTime = performance.now(); requestAnimationFrame(update); }
        function gameOver() { gameRunning = false; document.getElementById('finalScore').textContent = score; document.getElementById('gameOverScreen').style.display = 'flex'; }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) startGame(); player.x = e.touches[0].clientX; });
        c.addEventListener('touchmove', e => { if (gameRunning) player.x = e.touches[0].clientX; });
        c.addEventListener('mousemove', e => { if (gameRunning) player.x = e.clientX; });
        c.addEventListener('click', () => { if (!gameRunning && document.getElementById('startScreen').style.display !== 'none') startGame(); });
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('restartBtn').onclick = startGame;
        init();
    </script>
</body>
</html>
