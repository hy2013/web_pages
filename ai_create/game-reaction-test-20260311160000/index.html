<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>反应测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .title { font-size: 28px; font-weight: 900; color: #6cf; margin-bottom: 20px; }
        .target { width: 150px; height: 150px; background: #f44; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .target.ready { background: #4f4; }
        .target.wait { background: #f44; }
        .target span { color: #fff; font-size: 18px; font-weight: bold; }
        .score { font-size: 20px; color: #fff; margin: 10px 0; }
        .btn { margin-top: 20px; background: linear-gradient(135deg, #6cf 0%, #48c 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="title">⚡ 反应测试</div>
        <div class="score">最佳: <b id="best">0</b>ms</div>
        <div class="score">平均: <b id="avg">0</b>ms</div>
        <div class="score">次数: <b id="count">0</b></div>
        <div class="target" id="target"><span id="status">点击开始</span></div>
        <button class="btn" id="restartBtn">重新测试</button>
    </div>
    <script>
        let state = 'idle', startTime = 0, waitTime = 0, results = [], best = 0, avg = 0;

        function startTest() { state = 'waiting'; document.getElementById('status').textContent = '等待...'; document.getElementById('target').className = 'target wait'; waitTime = 1000 + Math.random() * 3000; setTimeout(() => { if (state === 'waiting') { state = 'ready'; startTime = Date.now(); document.getElementById('status').textContent = '点击!'; document.getElementById('target').className = 'target ready'; } }, waitTime); }

        function handleClick() {
            if (state === 'idle') { startTest(); return; }
            if (state === 'waiting') { state = 'idle'; document.getElementById('status').textContent = '太早!'; document.getElementById('target').className = 'target'; setTimeout(startTest, 1000); return; }
            if (state === 'ready') { const time = Date.now() - startTime; results.push(time); if (best === 0 || time < best) best = time; avg = Math.floor(results.reduce((a, b) => a + b, 0) / results.length); document.getElementById('best').textContent = best; document.getElementById('avg').textContent = avg; document.getElementById('count').textContent = results.length; document.getElementById('status').textContent = time + 'ms'; document.getElementById('target').className = 'target'; state = 'idle'; setTimeout(startTest, 1000); }
        }

        document.getElementById('target').onclick = handleClick;
        document.getElementById('restartBtn').onclick = () => { results = []; best = 0; avg = 0; document.getElementById('best').textContent = 0; document.getElementById('avg').textContent = 0; document.getElementById('count').textContent = 0; startTest(); };
    </script>
</body>
</html>
