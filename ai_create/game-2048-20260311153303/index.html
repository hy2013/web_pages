<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #ui { width: 100%; max-width: 350px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .score-box, .best-box { background: rgba(255, 215, 0, 0.2); border: 2px solid #ffd700; border-radius: 8px; padding: 8px 15px; }
        .score-box span, .best-box span { color: #ffd700; font-size: 14px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #1a1a2e; padding: 10px; border-radius: 10px; }
        .cell { width: 70px; height: 70px; background: #2a2a3e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #fff; transition: all 0.15s; }
        .cell[data-val="2"] { background: #eee4da; color: #776e65; }
        .cell[data-val="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-val="8"] { background: #f2b179; }
        .cell[data-val="16"] { background: #f59563; }
        .cell[data-val="32"] { background: #f67c5f; }
        .cell[data-val="64"] { background: #f65e3b; }
        .cell[data-val="128"] { background: #edcf72; font-size: 24px; }
        .cell[data-val="256"] { background: #edcc61; font-size: 24px; }
        .cell[data-val="512"] { background: #edc850; font-size: 24px; }
        .cell[data-val="1024"] { background: #edc53f; font-size: 20px; }
        .cell[data-val="2048"] { background: #edc22e; font-size: 20px; box-shadow: 0 0 20px #ffd700; }
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 15, 26, 0.95); z-index: 20; }
        .title { font-size: 28px; font-weight: 900; color: #ffd700; text-shadow: 0 0 15px #ffd700; margin-bottom: 10px; }
        .final-score { font-size: 20px; color: #fff; margin-bottom: 20px; }
        .btn { background: linear-gradient(135deg, #ffd700 0%, #daa520 100%); border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="score-box"><span>得分: <b id="score">0</b></span></div>
            <div class="best-box"><span>最高: <b id="best">0</b></span></div>
        </div>
        <div class="grid" id="grid"></div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="final-score">得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        let board = [], score = 0, best = 0;
        
        function init() {
            board = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const empty = [];
            board.forEach((row, r) => row.forEach((v, c) => { if (!v) empty.push({r, c}); }));
            if (empty.length) {
                const t = empty[Math.floor(Math.random() * empty.length)];
                board[t.r][t.c] = Math.random() > 0.9 ? 4 : 2;
            }
        }

        function render() {
            grid.innerHTML = '';
            board.forEach(row => row.forEach(v => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.val = v;
                cell.textContent = v || '';
                grid.appendChild(cell);
            }));
            document.getElementById('score').textContent = score;
            if (score > best) { best = score; document.getElementById('best').textContent = best; }
        }

        function move(dir) {
            const old = JSON.stringify(board);
            if (dir === 'left' || dir === 'right') {
                board.forEach(row => {
                    let r = row.filter(v => v);
                    if (dir === 'right') r.reverse();
                    for (let i = 0; i < r.length - 1; i++) {
                        if (r[i] === r[i+1]) { r[i] *= 2; score += r[i]; r[i+1] = 0; }
                    }
                    r = r.filter(v => v);
                    while (r.length < 4) r.push(0);
                    if (dir === 'right') r.reverse();
                    row.length = 0; row.push(...r);
                });
            } else {
                for (let c = 0; c < 4; c++) {
                    let r = [board[0][c], board[1][c], board[2][c], board[3][c]].filter(v => v);
                    if (dir === 'down') r.reverse();
                    for (let i = 0; i < r.length - 1; i++) {
                        if (r[i] === r[i+1]) { r[i] *= 2; score += r[i]; r[i+1] = 0; }
                    }
                    r = r.filter(v => v);
                    while (r.length < 4) r.push(0);
                    if (dir === 'down') r.reverse();
                    for (let i = 0; i < 4; i++) board[i][c] = r[i];
                }
            }
            if (JSON.stringify(board) !== old) { addRandomTile(); render(); checkGameOver(); }
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (!board[r][c]) return;
                    if (c < 3 && board[r][c] === board[r][c+1]) return;
                    if (r < 3 && board[r][c] === board[r+1][c]) return;
                }
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        let sx, sy;
        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; });
        c.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
            if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
        });
        c.addEventListener('click', e => {
            if (document.getElementById('gameOverScreen').style.display === 'flex') {
                document.getElementById('gameOverScreen').style.display = 'none';
                init();
            }
        });
        document.getElementById('restartBtn').onclick = () => { document.getElementById('gameOverScreen').style.display = 'none'; init(); };
        init();
    </script>
</body>
</html>
