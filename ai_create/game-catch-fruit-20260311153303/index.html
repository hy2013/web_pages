<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接水果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%); font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.8); border: 3px solid #228B22; border-radius: 10px; padding: 8px 15px; }
        .score-box span { color: #228B22; font-size: 18px; font-weight: bold; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); z-index: 20; }
        #gameOverScreen { display: none; }
        .title { font-size: 36px; font-weight: 900; color: #228B22; text-shadow: 2px 2px #fff; margin-bottom: 15px; }
        .subtitle { color: #fff; font-size: 14px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #32CD32 0%, #228B22 100%); border: 3px solid #006400; padding: 14px 40px; font-size: 18px; font-weight: bold; color: #fff; border-radius: 25px; cursor: pointer; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box"><span>得分: <b id="score">0</b></span></div>
        </div>
        <div id="startScreen">
            <div class="title">接水果</div>
            <div class="subtitle">左右移动篮子<br>接住水果得分🍎🍊🍌<br>漏掉3个游戏结束</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="subtitle" style="color:#ff0;font-size:20px">得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, score = 0, missed = 0, gameRunning = false;
        let basket, fruits = [], lastTime = 0, spawnTimer = 0;
        const FRUITS = [
            { color: '#ff4444', icon: '🍎', size: 35 },
            { color: '#ff8800', icon: '🍊', size: 32 },
            { color: '#ffdd00', icon: '🍌', size: 30 },
            { color: '#ff66aa', icon: '🍑', size: 33 },
            { color: '#aa44ff', icon: '🍇', size: 28 },
            { color: '#44aaff', icon: '🫐', size: 26 }
        ];

        function resize() {
            const c = document.getElementById('gameContainer');
            width = c.clientWidth; height = c.clientHeight;
            canvas.width = width; canvas.height = height;
        }

        function init() {
            resize(); window.addEventListener('resize', resize);
            basket = { x: width/2, y: height - 80, w: 80, h: 50 };
            fruits = []; score = 0; missed = 0; spawnTimer = 0;
            document.getElementById('score').textContent = 0;
        }

        function spawnFruit() {
            const f = FRUITS[Math.floor(Math.random() * FRUITS.length)];
            fruits.push({
                x: Math.random() * (width - 60) + 30,
                y: -30,
                vy: 2 + Math.random() * 2 + score * 0.005,
                ...f
            });
        }

        function update(t) {
            if (!gameRunning) return;
            if (t - lastTime > 100) { lastTime = t; return; }
            
            spawnTimer++;
            if (spawnTimer > 50) { spawnTimer = 0; spawnFruit(); }
            
            fruits.forEach((f, i) => {
                f.y += f.vy;
                if (f.y > basket.y - 10 && f.y < basket.y + basket.h && f.x > basket.x - basket.w/2 && f.x < basket.x + basket.w/2) {
                    score += 10;
                    fruits.splice(i, 1);
                    document.getElementById('score').textContent = score;
                } else if (f.y > height + 30) {
                    fruits.splice(i, 1);
                    missed++;
                    if (missed >= 3) { gameOver(); }
                }
            });
            
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, height - 40, width, 40);
            
            fruits.forEach(f => {
                ctx.font = f.size + 'px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(f.icon, f.x, f.y);
            });
            
            ctx.font = '45px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🧺', basket.x, basket.y + 10);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true; init(); lastTime = performance.now(); requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => {
            if (!gameRunning) { startGame(); return; }
            basket.x = e.touches[0].clientX;
        });
        c.addEventListener('touchmove', e => {
            if (!gameRunning) return;
            basket.x = e.touches[0].clientX;
        });
        c.addEventListener('mousemove', e => {
            if (!gameRunning) return;
            basket.x = e.clientX;
        });
        c.addEventListener('click', e => {
            if (!gameRunning && document.getElementById('startScreen').style.display !== 'none') startGame();
        });
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('restartBtn').onclick = startGame;
        init();
    </script>
</body>
</html>
