<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极速跑酷</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* 游戏容器 - 响应式设计 */
        #game-container {
            position: relative;
            width: 100vw;
            max-width: 428px;
            height: 100vh;
            margin: 0 auto;
            background-color: #2c3e50;
        }
        
        /* 游戏画布 */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* 游戏UI */
        #gameUI {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 得分显示 */
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            pointer-events: none;
        }
        
        /* 开始界面 */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            pointer-events: auto;
        }
        
        #game-title {
            font-size: 36px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 40px;
            text-align: center;
        }
        
        #game-rules {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 20px;
        }
        
        /* 按钮样式 */
        .button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.3s ease;
        }
        
        .button:hover {
            background-color: #c0392b;
        }
        
        /* 游戏结束界面 */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            pointer-events: auto;
        }
        
        #final-score {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        #restart-button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="gameUI">
            <div id="score">得分: 0</div>
            <div id="start-screen">
                <h1 id="game-title">极速跑酷</h1>
                <p id="game-rules">向上滑动屏幕控制角色跳跃，避开障碍物，收集金币得分。 玩家需要控制角色跳跃避开障碍物，收集金币得分</p>
                <button id="start-button" class="button">开始游戏</button>
            </div>
            <div id="game-over-screen">
                <h2 id="game-over-title">游戏结束</h2>
                <p id="final-score">最终得分: 0</p>
                <button id="restart-button" class="button">重新开始</button>
            </div>
        </div>
    </div>
    <script>
        /**
         * 游戏主逻辑
         */
        class Game {
            constructor() {
                // 获取画布和上下文
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // 设置画布尺寸
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // 游戏状态
                this.gameState = 'start'; // start, playing, gameOver
                
                // 游戏元素
                this.player = null;
                this.obstacles = [];
                this.collectibles = [];
                
                // 游戏数据
                this.score = 0;
                this.speed = 5;
                
                // 输入处理
                this.touchStartY = 0;
                this.isJumping = false;
                
                // 绑定事件
                this.bindEvents();
                
                // 游戏循环
                this.gameLoop();
            }
            
            /**
             * 调整画布尺寸
             */
            resizeCanvas() {
                const container = document.getElementById('game-container');
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }
            
            /**
             * 绑定事件
             */
            bindEvents() {
                // 开始按钮
                document.getElementById('start-button').addEventListener('click', () => {
                    this.startGame();
                });
                
                // 重新开始按钮
                document.getElementById('restart-button').addEventListener('click', () => {
                    this.restartGame();
                });
                
                // 触控事件
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.touchStartY = e.touches[0].clientY;
                });
                
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const touchEndY = e.changedTouches[0].clientY;
                    const deltaY = this.touchStartY - touchEndY;
                    
                    // 向上滑动跳跃
                    if (deltaY > 50 && !this.isJumping) {
                        this.player.jump();
                        this.isJumping = true;
                    }
                });
                
                // 键盘事件（用于测试）
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && !this.isJumping) {
                        this.player.jump();
                        this.isJumping = true;
                    }
                });
            }
            
            /**
             * 开始游戏
             */
            startGame() {
                // 隐藏开始界面
                document.getElementById('start-screen').style.display = 'none';
                
                // 初始化游戏元素
                this.initGameElements();
                
                // 设置游戏状态
                this.gameState = 'playing';
                this.score = 0;
                this.speed = 5;
                
                // 更新得分显示
                document.getElementById('score').textContent = "得分: " + this.score;
            }
            
            /**
             * 重新开始游戏
             */
            restartGame() {
                // 隐藏游戏结束界面
                document.getElementById('game-over-screen').style.display = 'none';
                
                // 重置游戏状态
                this.gameState = 'start';
                
                // 显示开始界面
                document.getElementById('start-screen').style.display = 'flex';
            }
            
            /**
             * 初始化游戏元素
             */
            initGameElements() {
                // 初始化玩家
                this.player = new Player(this.canvas.width / 4, this.canvas.height - 50, 30, 30);
                
                // 清空障碍物和收集物
                this.obstacles = [];
                this.collectibles = [];
            }
            
            /**
             * 游戏循环
             */
            gameLoop() {
                // 清空画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.gameState === 'playing') {
                    // 更新游戏元素
                    this.update();
                    
                    // 渲染游戏元素
                    this.render();
                    
                    // 检测碰撞
                    this.checkCollisions();
                    
                    // 生成障碍物和收集物
                    this.generateGameElements();
                }
                
                // 继续游戏循环
                requestAnimationFrame(() => this.gameLoop());
            }
            
            /**
             * 更新游戏元素
             */
            update() {
                // 更新玩家
                this.player.update();
                
                // 更新障碍物
                this.obstacles.forEach((obstacle, index) => {
                    obstacle.update(this.speed);
                    
                    // 移除超出屏幕的障碍物
                    if (obstacle.x + obstacle.width < 0) {
                        this.obstacles.splice(index, 1);
                    }
                });
                
                // 更新收集物
                this.collectibles.forEach((collectible, index) => {
                    collectible.update(this.speed);
                    
                    // 移除超出屏幕的收集物
                    if (collectible.x + collectible.width < 0) {
                        this.collectibles.splice(index, 1);
                    }
                });
                
                // 检查玩家是否落地
                if (this.player.y >= this.canvas.height - this.player.height) {
                    this.isJumping = false;
                }
            }
            
            /**
             * 渲染游戏元素
             */
            render() {
                // 渲染玩家
                this.player.render(this.ctx);
                
                // 渲染障碍物
                this.obstacles.forEach(obstacle => {
                    obstacle.render(this.ctx);
                });
                
                // 渲染收集物
                this.collectibles.forEach(collectible => {
                    collectible.render(this.ctx);
                });
            }
            
            /**
             * 检测碰撞
             */
            checkCollisions() {
                // 检测玩家与障碍物碰撞
                for (const obstacle of this.obstacles) {
                    if (this.checkCollision(this.player, obstacle)) {
                        this.gameOver();
                        return;
                    }
                }
                
                // 检测玩家与收集物碰撞
                this.collectibles.forEach((collectible, index) => {
                    if (this.checkCollision(this.player, collectible)) {
                        // 增加得分
                        this.score += 10;
                        document.getElementById('score').textContent = "得分: " + this.score;
                        
                        // 移除收集物
                        this.collectibles.splice(index, 1);
                        
                        // 增加游戏速度
                        this.speed += 0.1;
                    }
                });
            }
            
            /**
             * 检测两个矩形之间的碰撞
             */
            checkCollision(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }
            
            /**
             * 生成游戏元素
             */
            generateGameElements() {
                // 随机生成障碍物
                if (Math.random() < 0.02) {
                    const height = Math.random() * 50 + 30;
                    const obstacle = new Obstacle(this.canvas.width, this.canvas.height - height, 30, height);
                    this.obstacles.push(obstacle);
                }
                
                // 随机生成收集物
                if (Math.random() < 0.015) {
                    const y = Math.random() * (this.canvas.height - 100) + 50;
                    const collectible = new Collectible(this.canvas.width, y, 20, 20);
                    this.collectibles.push(collectible);
                }
            }
            
            /**
             * 游戏结束
             */
            gameOver() {
                // 设置游戏状态
                this.gameState = 'gameOver';
                
                // 更新最终得分
                document.getElementById('final-score').textContent = "最终得分: " + this.score;
                
                // 显示游戏结束界面
                document.getElementById('game-over-screen').style.display = 'flex';
            }
        }
        
        /**
         * 玩家类
         */
        class Player {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.velocityY = 0;
                this.gravity = 0.8;
                this.jumpPower = -15;
            }
            
            /**
             * 更新玩家状态
             */
            update() {
                // 应用重力
                this.velocityY += this.gravity;
                this.y += this.velocityY;
                
                // 防止玩家超出屏幕
                if (this.y >= canvas.height - this.height) {
                    this.y = canvas.height - this.height;
                    this.velocityY = 0;
                }
                
                if (this.y < 0) {
                    this.y = 0;
                    this.velocityY = 0;
                }
            }
            
            /**
             * 渲染玩家
             */
            render(ctx) {
                ctx.fillStyle = '#FF5733';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
            
            /**
             * 跳跃
             */
            jump() {
                this.velocityY = this.jumpPower;
            }
        }
        
        /**
         * 障碍物类
         */
        class Obstacle {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
            }
            
            /**
             * 更新障碍物位置
             */
            update(speed) {
                this.x -= speed;
            }
            
            /**
             * 渲染障碍物
             */
            render(ctx) {
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }
        
        /**
         * 收集物类
         */
        class Collectible {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
            }
            
            /**
             * 更新收集物位置
             */
            update(speed) {
                this.x -= speed;
            }
            
            /**
             * 渲染收集物
             */
            render(ctx) {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 初始化游戏
        window.addEventListener('load', () => {
            new Game();
        });
    </script>
</body>
</html>
