<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打地鼠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #4a7c4a; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #5a9c5a 0%, #3d6b3d 100%); display: flex; flex-direction: column; align-items: center; padding: 15px; }
        #ui { width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .score-box, .time-box { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 8px 15px; }
        .score-box span, .time-box span { color: #fff; font-size: 18px; font-weight: bold; }
        .game-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; width: 100%; max-width: 350px; }
        .hole { background: linear-gradient(180deg, #2d5a2d 0%, #1a3a1a 100%); border-radius: 50%; position: relative; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }
        .mole { width: 70%; height: 80%; background: #8B4513; border-radius: 40% 40% 20% 20%; position: absolute; bottom: -100%; left: 15%; transition: bottom 0.1s; display: flex; justify-content: center; align-items: center; }
        .mole.up { bottom: 0; }
        .mole::before { content: '🐹'; font-size: 28px; }
        .mole.hit { background: #ff4444; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 15px #4a4; margin-bottom: 15px; }
        .subtitle { color: #ccc; font-size: 14px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #6cb86c 0%, #4a8a4a 100%); border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; color: #fff; border-radius: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="score-box"><span>得分: <b id="score">0</b></span></div>
            <div class="time-box"><span>时间: <b id="time">30</b>s</span></div>
        </div>
        <div class="game-area" id="gameArea">
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
            <div class="hole"><div class="mole"></div></div>
        </div>
        <div id="startScreen">
            <div class="title">🐹 打地鼠</div>
            <div class="subtitle">点击出现的地鼠得分<br>30秒内尽可能多打<br>地鼠出现就点击</div>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>
    </div>
    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        let score = 0, timeLeft = 30, gameRunning = false, timer = null, moleTimer = null;
        let lastHole = -1;

        function randomHole() {
            let idx;
            do { idx = Math.floor(Math.random() * 9); } while (idx === lastHole);
            lastHole = idx;
            return holes[idx];
        }

        function showMole() {
            const hole = randomHole();
            const mole = hole.querySelector('.mole');
            mole.classList.remove('hit');
            mole.classList.add('up');
            
            const stayTime = 600 + Math.random() * 600;
            setTimeout(() => {
                mole.classList.remove('up');
                if (gameRunning) showMole();
            }, stayTime);
        }

        function hitMole(e) {
            if (!gameRunning) return;
            const mole = e.target;
            if (!mole.classList.contains('up') || mole.classList.contains('hit')) return;
            
            mole.classList.add('hit');
            score += 10;
            document.getElementById('score').textContent = score;
            
            setTimeout(() => mole.classList.remove('up'), 150);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            score = 0; timeLeft = 30;
            document.getElementById('score').textContent = 0;
            document.getElementById('time').textContent = 30;
            gameRunning = true;
            
            showMole();
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    gameRunning = false;
                    alert('游戏结束！得分: ' + score);
                    document.getElementById('startScreen').style.display = 'flex';
                }
            }, 1000);
        }

        moles.forEach(mole => mole.addEventListener('click', hitMole));
        moles.forEach(mole => mole.addEventListener('touchstart', e => { e.preventDefault(); hitMole(e); }));
        document.getElementById('startBtn').addEventListener('click', startGame);
    </script>
</body>
</html>
