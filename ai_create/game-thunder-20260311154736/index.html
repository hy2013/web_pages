<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷电</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: radial-gradient(ellipse at top, #1a0a3a 0%, #000 70%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,0,0.2); border: 2px solid #ff0; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #ff0; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #ff0; text-shadow: 0 0 20px #ff0; margin-bottom: 15px; }
        .subtitle { color: #88a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #ff0 0%, #cc0 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">⚡ 雷电</div>
            <div class="subtitle">点击发射子弹<br>击落敌机得分<br>躲避子弹</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, gameRunning = false;
        let player = { x: 0, y: 0 }, bullets = [], enemies = [], enemyBullets = [], particles = [];

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; }
        function init() { resize(); player = { x: w/2, y: h - 80 }; bullets = []; enemies = []; enemyBullets = []; particles = []; score = 0; document.getElementById('score').textContent = 0; }

        function spawnEnemy() { enemies.push({ x: Math.random() * (w-40) + 20, y: -30, type: Math.random() > 0.7 ? 'boss' : 'normal', hp: Math.random() > 0.7 ? 5 : 1, vx: (Math.random()-0.5)*2, vy: 2+Math.random()*2 }); }

        function update() {
            if (!gameRunning) return;
            if (Math.random() < 0.02 + score*0.0001) spawnEnemy();
            bullets.forEach((b, i) => { b.y -= 10; if (b.y < 0) bullets.splice(i, 1); });
            enemies.forEach((e, ei) => { e.x += e.vx; e.y += e.vy; if (e.x < 20 || e.x > w-20) e.vx *= -1; if (Math.random() < 0.02) enemyBullets.push({ x: e.x, y: e.y + 20, vy: 5 }); if (e.y > h + 50) enemies.splice(ei, 1); });
            bullets.forEach((b, bi) => { enemies.forEach((e, ei) => { if (Math.abs(b.x - e.x) < 25 && Math.abs(b.y - e.y) < 25) { e.hp--; bullets.splice(bi, 1); if (e.hp <= 0) { score += e.type === 'boss' ? 50 : 10; enemies.splice(ei, 1); document.getElementById('score').textContent = score; } } }); });
            enemyBullets.forEach((eb, i) => { eb.y += eb.vy; if (Math.abs(eb.x - player.x) < 20 && Math.abs(eb.y - player.y) < 20) { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; } if (eb.y > h) enemyBullets.splice(i, 1); });
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, w, h); enemies.forEach(e => { ctx.fillStyle = e.type === 'boss' ? '#f00' : '#f60'; ctx.fillRect(e.x-15, e.y-15, 30, 30); }); enemyBullets.forEach(eb => { ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); }); bullets.forEach(b => { ctx.fillStyle = '#ff0'; ctx.fillRect(b.x-2, b.y-8, 4, 16); }); ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.moveTo(player.x, player.y-20); ctx.lineTo(player.x-15, player.y+10); ctx.lineTo(player.x, player.y); ctx.lineTo(player.x+15, player.y+10); ctx.closePath(); ctx.fill(); }

        document.getElementById('gameContainer').addEventListener('click', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else { bullets.push({ x: player.x, y: player.y-20 }); } });
        init();
    </script>
</body>
</html>
