<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>忍者跑酷</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #2d1b4e 0%, #1a1a2e 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,100,255,0.3); border: 2px solid #f6f; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #f6f; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(26,26,46,0.95); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #f6f; margin-bottom: 15px; text-shadow: 0 0 20px #f6f; }
        .subtitle { color: #a8a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #f6f 0%, #d4d 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #fff; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">🥷 忍者跑酷</div>
            <div class="subtitle">点击跳跃滑行躲避障碍<br>收集手里剑加分<br>跑得越远分数越高</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, gameRunning = false, action = 'run';
        let player = { y: 0, vy: 0 }, obstacles = [], shurikens = [], groundY;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; groundY = h - 80; }
        function init() { resize(); player = { y: groundY, vy: 0 }; obstacles = []; shurikens = []; score = 0; action = 'run'; document.getElementById('score').textContent = 0; }

        function update() {
            if (!gameRunning) return;
            if (action === 'jump' && player.y >= groundY) { player.vy = -15; action = 'run'; }
            if (action === 'slide') { action = 'run'; }
            player.vy += 0.8;
            player.y += player.vy;
            if (player.y > groundY) { player.y = groundY; player.vy = 0; }
            if (Math.random() < 0.02) obstacles.push({ x: w + 30, y: groundY - 40, w: 30, h: 40, type: 'high' });
            if (Math.random() < 0.015) obstacles.push({ x: w + 30, y: groundY - 25, w: 40, h: 25, type: 'low' });
            if (Math.random() < 0.01) shurikens.push({ x: w + 20, y: groundY - 60 - Math.random() * 40, angle: 0 });
            obstacles.forEach((o, i) => { o.x -= 6; if (player.x + 20 > o.x && player.x - 20 < o.x + o.w && player.y - (action === 'slide' ? 10 : 30) < o.y + o.h && player.y + 20 > o.y) gameOver(); if (o.x < -50) obstacles.splice(i, 1); });
            shurikens.forEach((s, i) => { s.x -= 5; s.angle += 0.3; if (Math.abs(player.x - s.x) < 25 && Math.abs(player.y - s.y) < 25) { score += 20; shurikens.splice(i, 1); } if (s.x < -30) shurikens.splice(i, 1); });
            score++; document.getElementById('score').textContent = score;
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#3d2b5e'; ctx.fillRect(0, groundY + 30, w, 50); ctx.fillStyle = '#f6f'; ctx.fillRect(60, player.y - 30, 30, 30); ctx.fillStyle = '#fff'; ctx.fillRect(65, player.y - 25, 8, 8); ctx.fillRect(77, player.y - 25, 8, 8); if (action === 'slide') { ctx.fillRect(55, player.y - 5, 40, 15); } obstacles.forEach(o => { ctx.fillStyle = '#f44'; ctx.fillRect(o.x, o.y, o.w, o.h); }); shurikens.forEach(s => { ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.angle); ctx.fillStyle = '#ccc'; for (let i = 0; i < 4; i++) { ctx.fillRect(-12, -2, 24, 4); ctx.rotate(Math.PI / 2); } ctx.restore(); }); }

        function gameOver() { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else { action = 'jump'; } });
        c.addEventListener('touchmove', e => { if (gameRunning && e.touches[0].clientY > h * 0.6) action = 'slide'; });
        c.addEventListener('mousedown', () => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else { action = 'jump'; } });
        init();
    </script>
</body>
</html>
