<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打砖块</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #0f0f1a; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box, .lives-box { background: rgba(255, 100, 100, 0.2); border: 2px solid #f66; border-radius: 8px; padding: 8px 15px; }
        .score-box span, .lives-box span { color: #f88; font-size: 16px; font-weight: bold; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 15, 26, 0.97); z-index: 20; }
        #gameOverScreen { display: none; }
        .title { font-size: 34px; font-weight: 900; color: #f66; text-shadow: 0 0 20px #f66; margin-bottom: 15px; }
        .subtitle { color: #88a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #f66 0%, #d44 100%); border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; color: #fff; border-radius: 25px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 100, 100, 0.5); }
        .final-score { font-size: 22px; color: #ff0; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box"><span>得分: <b id="score">0</b></span></div>
            <div class="lives-box"><span>生命: <b id="lives">3</b></span></div>
        </div>
        <div id="startScreen">
            <div class="title">打砖块</div>
            <div class="subtitle">拖动挡板反弹球<br>消除所有砖块获胜<br>漏球会损失生命</div>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, score = 0, lives = 3, gameRunning = false;
        let paddle, ball, bricks = [], particles = [], lastTime = 0;

        function resize() {
            const c = document.getElementById('gameContainer');
            width = c.clientWidth; height = c.clientHeight;
            canvas.width = width; canvas.height = height;
        }

        function init() {
            resize(); window.addEventListener('resize', resize);
            paddle = { x: width/2, y: height - 50, w: 80, h: 12 };
            ball = { x: width/2, y: height - 80, r: 10, vx: 4, vy: -5 };
            bricks = [];
            const rows = 5, cols = 8, colors = ['#f66', '#f90', '#ff0', '#6f6', '#66f'];
            const bw = (width - 40) / cols, bh = 25;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    bricks.push({ x: 20 + c * bw, y: 80 + r * bh, w: bw - 4, h: bh - 4, color: colors[r], alive: true });
                }
            }
            score = 0; lives = 3; particles = [];
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 4;
                particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color });
            }
        }

        function update(t) {
            if (!gameRunning) return;
            if (t - lastTime > 100) { lastTime = t; return; }
            
            ball.x += ball.vx; ball.y += ball.vy;
            
            if (ball.x < ball.r || ball.x > width - ball.r) ball.vx *= -1;
            if (ball.y < ball.r) ball.vy *= -1;
            
            if (ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h && ball.x > paddle.x - paddle.w/2 && ball.x < paddle.x + paddle.w/2) {
                ball.vy = -Math.abs(ball.vy);
                ball.vx += (ball.x - paddle.x) * 0.1;
            }
            
            if (ball.y > height) {
                lives--; updateUI();
                if (lives <= 0) { gameOver(); return; }
                ball.x = width/2; ball.y = height - 80; ball.vx = 4; ball.vy = -5;
            }
            
            bricks.forEach(b => {
                if (!b.alive) return;
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    b.alive = false;
                    ball.vy *= -1;
                    score += 10;
                    createParticles(b.x + b.w/2, b.y + b.h/2, b.color);
                    updateUI();
                }
            });
            
            if (bricks.every(b => !b.alive)) {
                init(); ball.vx *= 1.2; ball.vy *= 1.2;
            }
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            });
            
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, width, height);
            
            bricks.forEach(b => {
                if (!b.alive) return;
                ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 10;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            });
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#f66'; ctx.shadowColor = '#f66'; ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x - paddle.w/2, paddle.y, paddle.w, paddle.h);
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            
            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true; init(); lastTime = performance.now(); requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        const c = document.getElementById('gameContainer');
        let dragging = false;
        c.addEventListener('touchstart', e => { dragging = true; if (!gameRunning) startGame(); });
        c.addEventListener('touchmove', e => { if (!dragging || !gameRunning) return; paddle.x = e.touches[0].clientX; if (paddle.x < paddle.w/2) paddle.x = paddle.w/2; if (paddle.x > width - paddle.w/2) paddle.x = width - paddle.w/2; });
        c.addEventListener('touchend', () => dragging = false);
        c.addEventListener('mousedown', e => { dragging = true; if (!gameRunning) startGame(); });
        c.addEventListener('mousemove', e => { if (!dragging || !gameRunning) return; paddle.x = e.clientX; });
        c.addEventListener('mouseup', () => dragging = false);
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('restartBtn').onclick = startGame;
        init();
    </script>
</body>
</html>
