<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #2a2a3a; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .puzzle { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; background: #1a1a2a; padding: 5px; border-radius: 8px; }
        .piece { width: 90px; height: 90px; background: linear-gradient(135deg, #6cf 0%, #48c 100%); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #fff; cursor: pointer; transition: all 0.15s; }
        .piece.empty { background: #1a1a2a; cursor: default; }
        .btn { margin-top: 15px; background: linear-gradient(135deg, #6cf 0%, #48c 100%); border: none; padding: 10px 25px; font-size: 14px; font-weight: bold; color: #fff; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="title">🧩 拼图</div>
        <div class="puzzle" id="puzzle"></div>
        <button class="btn" id="restartBtn">重新打乱</button>
    </div>
    <script>
        let pieces = [];
        function init() {
            pieces = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            for (let i = 0; i < 500; i++) {
                const empty = pieces.indexOf(0);
                const neighbors = [empty - 1, empty + 1, empty - 3, empty + 3].filter(n => n >= 0 && n < 9 && (Math.abs(n - empty) !== 1 || Math.floor(n/3) === Math.floor(empty/3) || Math.abs(n-empty) === 3));
                const move = neighbors[Math.floor(Math.random() * neighbors.length)];
                [pieces[empty], pieces[move]] = [pieces[move], pieces[empty]];
            }
            render();
        }
        function render() {
            const p = document.getElementById('puzzle'); p.innerHTML = '';
            pieces.forEach((n, i) => {
                const d = document.createElement('div');
                d.className = 'piece' + (n === 0 ? ' empty' : '');
                d.textContent = n || '';
                d.onclick = () => clickPiece(i);
                p.appendChild(d);
            });
        }
        function clickPiece(i) {
            const empty = pieces.indexOf(0);
            const neighbors = [empty - 1, empty + 1, empty - 3, empty + 3].filter(n => n >= 0 && n < 9 && (Math.abs(n - empty) !== 1 || Math.floor(n/3) === Math.floor(empty/3) || Math.abs(n-empty) === 3));
            if (neighbors.includes(i)) {
                [pieces[empty], pieces[i]] = [pieces[i], pieces[empty]];
                render();
                if (pieces.every((n, i) => n === (i + 1) % 9)) setTimeout(() => alert('恭喜完成!'), 100);
            }
        }
        document.getElementById('restartBtn').onclick = init;
        init();
    </script>
</body>
</html>
