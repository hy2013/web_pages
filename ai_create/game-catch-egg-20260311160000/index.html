<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>接鸡蛋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #87CEEB 0%, #90EE90 50%, #228B22 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.8); border: 2px solid #228B22; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #228B22; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(135,206,235,0.95); z-index: 20; }
        .title { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 15px; text-shadow: 1px 1px #228B22; }
        .subtitle { color: #333; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div><div class="score-box"><span>生命: <b id="lives">3</b></span></div></div>
        <div id="startScreen">
            <div class="title">🐔 接鸡蛋</div>
            <div class="subtitle">左右滑动接鸡蛋<br>漏掉3个游戏结束<br>接到金蛋加分</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, lives = 3, gameRunning = false;
        let basket = { x: 0, w: 80 }, eggs = [], lastSpawn = 0;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; }
        function init() { resize(); basket = { x: w/2, w: 80 }; eggs = []; score = 0; lives = 3; document.getElementById('score').textContent = 0; document.getElementById('lives').textContent = 3; }

        function update(timestamp) {
            if (!gameRunning) return;
            if (timestamp - lastSpawn > 1000 - score * 2) { eggs.push({ x: Math.random() * (w - 30) + 15, y: -20, vy: 3 + Math.random() * 2, gold: Math.random() > 0.9 }); lastSpawn = timestamp; }
            eggs.forEach(e => e.y += e.vy);
            eggs.forEach((e, i) => { if (e.y > h - 50 && Math.abs(e.x - basket.x) < basket.w/2) { score += e.gold ? 50 : 10; eggs.splice(i, 1); document.getElementById('score').textContent = score; } else if (e.y > h + 20) { eggs.splice(i, 1); if (!e.gold) { lives--; document.getElementById('lives').textContent = lives; if (lives <= 0) { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; } } } });
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#90EE90'; ctx.fillRect(0, h * 0.6, w, h * 0.4); ctx.fillStyle = '#228B22'; ctx.fillRect(0, h - 30, w, 30); eggs.forEach(e => { ctx.fillStyle = e.gold ? '#FFD700' : '#fff'; ctx.beginPath(); ctx.ellipse(e.x, e.y, 12, 15, 0, 0, Math.PI*2); ctx.fill(); }); ctx.fillStyle = '#8B4513'; ctx.fillRect(basket.x - basket.w/2, h - 60, basket.w, 30); ctx.fillStyle = '#A0522D'; ctx.fillRect(basket.x - basket.w/2 - 5, h - 50, 10, 20); ctx.fillRect(basket.x + basket.w/2 - 5, h - 50, 10, 20); }

        let lastX;
        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); lastSpawn = 0; update(0); } lastX = e.touches[0].clientX; });
        c.addEventListener('touchmove', e => { if (gameRunning) { basket.x += (e.touches[0].clientX - lastX) * 1.5; basket.x = Math.max(basket.w/2, Math.min(w - basket.w/2, basket.x)); lastX = e.touches[0].clientX; } });
        c.addEventListener('mousedown', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); lastSpawn = 0; update(0); } lastX = e.clientX; });
        c.addEventListener('mousemove', e => { if (gameRunning) { basket.x += (e.clientX - lastX) * 1.5; basket.x = Math.max(basket.w/2, Math.min(w - basket.w/2, basket.x)); lastX = e.clientX; } });
        init();
    </script>
</body>
</html>
