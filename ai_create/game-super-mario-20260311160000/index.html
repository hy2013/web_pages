<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超级玛丽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #5c94fc; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 60%, #c84c0c 60%, #c84c0c 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,255,255,0.8); border: 2px solid #000; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #000; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(92,148,252,0.95); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #ff0; margin-bottom: 15px; text-shadow: 2px 2px #000; }
        .subtitle { color: #fff; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #ff0 0%, #da0 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">🍄 超级玛丽</div>
            <div class="subtitle">点击跳跃/二段跳<br>踩敌人/吃蘑菇<br>收集金币</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, gameRunning = false, canJump = true;
        let player = { x: 0, y: 0, vy: 0, size: 30 }, platforms = [], enemies = [], coins = [], groundY;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; groundY = h * 0.6; }
        function init() { resize(); player = { x: 80, y: groundY - 30, vy: 0, size: 30 }; platforms = [{x: 0, y: groundY, w: w, h: h - groundY}, {x: w*0.2, y: groundY - 80, w: 100, h: 20}, {x: w*0.5, y: groundY - 120, w: 100, h: 20}, {x: w*0.7, y: groundY - 60, w: 80, h: 20}, {x: w*0.4, y: groundY - 180, w: 80, h: 20}]; enemies = []; coins = []; score = 0; canJump = true; document.getElementById('score').textContent = 0; }

        function jump() { if (player.vy === 0 || canJump) { player.vy = -15; canJump = false; } }

        function update() {
            if (!gameRunning) return;
            player.vy += 0.8;
            player.y += player.vy;
            platforms.forEach(p => { if (player.x + player.size > p.x && player.x < p.x + p.w && player.y + player.size > p.y && player.y + player.size < p.y + p.h + 20 && player.vy > 0) { player.y = p.y - player.size; player.vy = 0; canJump = true; } });
            if (player.y > h) { gameOver(); return; }
            if (Math.random() < 0.005) enemies.push({ x: w + 20, y: groundY - 25, vx: -2 });
            if (Math.random() < 0.008) coins.push({ x: w + 20, y: groundY - 50 - Math.random() * 100, collected: false });
            enemies.forEach((e, i) => { e.x += e.vx; if (player.x + player.size > e.x && player.x < e.x + 25 && player.y + player.size > e.y && player.y < e.y + 25) { if (player.vy > 0) { enemies.splice(i, 1); player.vy = -8; score += 100; } else { gameOver(); } } if (e.x < -30) enemies.splice(i, 1); });
            coins.forEach((c, i) => { c.x -= 3; if (!c.collected && Math.abs(player.x + player.size/2 - c.x) < 20 && Math.abs(player.y + player.size/2 - c.y) < 20) { c.collected = true; score += 50; coins.splice(i, 1); } if (c.x < -20) coins.splice(i, 1); });
            score++; document.getElementById('score').textContent = score;
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#5c94fc'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#c84c0c'; ctx.fillRect(0, groundY, w, h - groundY); platforms.forEach(p => { if (p.h < 30) { ctx.fillStyle = '#8B4513'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = '#228B22'; ctx.fillRect(p.x - 5, p.y - 8, p.w + 10, 8); } }); coins.forEach(c => { if (!c.collected) { ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#FFA500'; ctx.beginPath(); ctx.arc(c.x - 3, c.y - 3, 3, 0, Math.PI*2); ctx.fill(); } }); enemies.forEach(e => { ctx.fillStyle = '#8B0000'; ctx.fillRect(e.x, e.y, 25, 25); ctx.fillStyle = '#fff'; ctx.fillRect(e.x + 3, e.y + 5, 8, 8); ctx.fillRect(e.x + 14, e.y + 5, 8, 8); }); ctx.fillStyle = '#ff0'; ctx.fillRect(player.x + 5, player.y + 5, 20, 15); ctx.fillStyle = '#ff9999'; ctx.fillRect(player.x + 8, player.y - 5, 14, 12); ctx.fillStyle = '#000'; ctx.fillRect(player.x + 12, player.y - 2, 3, 3); ctx.fillRect(player.x + 18, player.y - 2, 3, 3); }

        function gameOver() { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else jump(); });
        c.addEventListener('mousedown', () => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else jump(); });
        init();
    </script>
</body>
</html>
