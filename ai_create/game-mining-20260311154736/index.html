<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>挖矿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #2a1810; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #3a2818; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,215,0,0.2); border: 2px solid #ffd700; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #ffd700; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(42,24,16,0.95); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #ffd700; margin-bottom: 15px; }
        .subtitle { color: #c9a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>金币: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">⛏️ 挖矿</div>
            <div class="subtitle">点击方块挖掘<br>深挖寻找宝藏<br>挖到钻石加分</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, grid = [], gameRunning = false, gridSize = 8;
        const ores = [
            { color: '#8B4513', value: 1, chance: 0.5, name: '泥土' },
            { color: '#696969', value: 5, chance: 0.3, name: '石头' },
            { color: '#c0c0c0', value: 15, chance: 0.15, name: '银矿' },
            { color: '#ffd700', value: 30, chance: 0.04, name: '金矿' },
            { color: '#00ffff', value: 100, chance: 0.01, name: '钻石' }
        ];

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; }
        function init() { resize(); score = 0; grid = []; for (let i = 0; i < gridSize; i++) { grid[i] = []; for (let j = 0; j < gridSize; j++) { let r = Math.random(), cum = 0; for (let o of ores) { cum += o.chance; if (r < cum) { grid[i][j] = o; break; } } } } document.getElementById('score').textContent = 0; draw(); }

        function clickCell(e) {
            if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; return; }
            const rect = canvas.getBoundingClientRect(), cellSize = w / gridSize, x = Math.floor((e.clientX - rect.left) / cellSize), y = Math.floor((e.clientY - rect.top) / cellSize);
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize && grid[y][x]) { score += grid[y][x].value; grid[y][x] = null; document.getElementById('score').textContent = score; draw(); }
        }

        function draw() { ctx.fillStyle = '#3a2818'; ctx.fillRect(0, 0, w, h); const cellSize = w / gridSize; grid.forEach((row, y) => row.forEach((cell, x) => { if (cell) { ctx.fillStyle = cell.color; ctx.fillRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4); ctx.strokeStyle = '#222'; ctx.strokeRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4); } })); }

        canvas.addEventListener('click', clickCell);
        document.getElementById('startBtn').onclick = () => { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); };
        init();
    </script>
</body>
</html>
