<!DOCTYPE html>
<html>
<head>
    <title>ShaderToy Viewer</title>
    <style>
        * { margin: 0; padding: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 初始化Three.js基础组件
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer();
        document.body.appendChild(renderer.domElement);

        // 设置全屏尺寸
        function onResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onResize);
        onResize();

        // 替换这里的片元着色器代码↓↓↓↓↓↓
        const fragmentShader = `
			//#version 300 es
			precision highp float;
			
            uniform vec3 iResolution;
            uniform float iTime;
            uniform vec4 iMouse;
            
            

#define R(a) mat2(cos(a + vec4(0,33,11,0)))

void mainImage(out vec4 O, vec2 F) {

    vec2    V               = iResolution.xy,
              i             = (F+F-V)/V.y;
    float       b           = iTime * .8,
                  r         = sin(b*.5)*.2+.7,
                    a       , 
                      n     , 
                        t   ;
    
    for (O *= a; a++ < 60.  ;
         O += .06 * (1.  + cos(t*.7 + b + length(i) + vec4(0,1,2,0))) 
                  * (.53 + sin(t+t  + b*4.)*.5) / (.2 + n/.1)) 
    {
        vec3 p = t * normalize(vec3(i * R(b/4.), 1)), q;
        
        p.xz *= R(t*.03);  
        p.z += b; 
        q = p;
        
        p.xy *= R(floor(p.z/.07) * .2 + b*.5);
        p.x = abs(p.x)-.5;
        p.z = mod(p.z, .07) - .035;
        
        t += min(
            n = length(p) - .02, 
            abs(length(vec2(length(mod(q.xy+r,r+r)-r)-.5,p.z))-.02)+.003);
    }
    
    O = tanh(O); // simple tonemapping thanks to Xor
}
            
            void main() {
                mainImage(gl_FragColor, gl_FragCoord.xy);
            }
        `;

        // 顶点着色器（通常不需要修改）
        const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        // 创建着色器材质
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector3() },
                iMouse: { value: new THREE.Vector4() }
            }
        });

        // 创建全屏平面
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(2, 2),
            material
        );
        scene.add(plane);

        // 鼠标交互处理
        const mouse = new THREE.Vector4();
        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        document.addEventListener('click', e => {
            mouse.z = e.clientX;
            mouse.w = e.clientY;
        });

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新uniforms
            material.uniforms.iTime.value = performance.now() / 1000;
            material.uniforms.iResolution.value.set(
                window.innerWidth,
                window.innerHeight,
                1
            );
            material.uniforms.iMouse.value.copy(mouse);
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
