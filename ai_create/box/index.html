<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cube</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  .cube-container {
    perspective: 1000px;
    width: 200px;
    height: 200px;
  }

  .cube {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    animation: rotateCube 5s infinite linear;
  }

  .cube-face {
    position: absolute;
    width: 200px;
    height: 200px;
    background-color: rgba(255, 255, 255, 0.8);
    border: 1px solid #333;
    font-size: 24px;
    text-align: center;
    line-height: 200px;
    color: #333;
  }

  .front  { transform: translateZ(100px); }
  .back   { transform: rotateX(180deg) translateZ(100px); }
  .right  { transform: rotateY(90deg) translateZ(100px); }
  .left   { transform: rotateY(-90deg) translateZ(100px); }
  .top    { transform: rotateX(90deg) translateZ(100px); }
  .bottom { transform: rotateX(-90deg) translateZ(100px); }

  @keyframes rotateCube {
    from { transform: translateZ(-100px) rotateX(0deg) rotateY(0deg); }
    to   { transform: translateZ(-100px) rotateX(360deg) rotateY(360deg); }
  }
</style>
</head>
<body>
<div class="cube-container">
  <div class="cube">
    <div class="cube-face front">1</div>
    <div class="cube-face back">2</div>
    <div class="cube-face right">3</div>
    <div class="cube-face left">4</div>
    <div class="cube-face top">5</div>
    <div class="cube-face bottom">6</div>
  </div>
</div>
</body>
</html>
