<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>节奏大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #2d1b4e 0%, #1a1a2e 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,100,255,0.3); border: 2px solid #f6f; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #f6f; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(26,26,46,0.95); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #f6f; margin-bottom: 15px; text-shadow: 0 0 20px #f6f; }
        .subtitle { color: #a8a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #f6f 0%, #d4d 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #fff; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div><div class="score-box"><span>连击: <b id="combo">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">🎵 节奏大师</div>
            <div class="subtitle">点击落下的音符<br>完美Timing获得高分<br>连击越高分数加成越多</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, combo = 0, gameRunning = false, notes = [], lanes = [0, 1, 2, 3], hitLineY;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; hitLineY = h - 100; }
        function init() { resize(); score = 0; combo = 0; notes = []; document.getElementById('score').textContent = 0; document.getElementById('combo').textContent = 0; }

        function update() {
            if (!gameRunning) return;
            if (Math.random() < 0.03) { const lane = Math.floor(Math.random() * 4); notes.push({ lane, y: -30, hit: false }); }
            notes.forEach(n => n.y += 5);
            notes.forEach((n, i) => { if (n.y > h + 30) { notes.splice(i, 1); combo = 0; document.getElementById('combo').textContent = 0; } });
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, w, h); const laneWidth = w / 4; for (let i = 0; i < 4; i++) { ctx.strokeStyle = 'rgba(255,100,255,0.3)'; ctx.lineWidth = 2; ctx.strokeRect(i * laneWidth, 0, laneWidth, h); } ctx.strokeStyle = '#f6f'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, hitLineY); ctx.lineTo(w, hitLineY); ctx.stroke(); notes.forEach(n => { if (!n.hit) { ctx.fillStyle = '#f6f'; ctx.beginPath(); ctx.arc(n.lane * laneWidth + laneWidth/2, n.y, 20, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(n.lane * laneWidth + laneWidth/2, n.y, 10, 0, Math.PI*2); ctx.fill(); } }); }

        function handleTap(x) { const laneWidth = w / 4; const lane = Math.floor(x / laneWidth); const note = notes.find(n => n.lane === lane && Math.abs(n.y - hitLineY) < 50); if (note) { note.hit = true; notes = notes.filter(n => n !== note); combo++; const points = Math.max(10, 50 - Math.abs(note.y - hitLineY)); score += points * (1 + combo * 0.1); document.getElementById('score').textContent = Math.floor(score); document.getElementById('combo').textContent = combo; } }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else handleTap(e.touches[0].clientX); });
        c.addEventListener('click', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } else handleTap(e.clientX); });
        init();
    </script>
</body>
</html>
