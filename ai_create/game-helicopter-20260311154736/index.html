<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直升机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: linear-gradient(180deg, #1a3a1a 0%, #0a1a0a 50%, #051005 100%); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(100,255,100,0.2); border: 2px solid #6f6; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #6f6; font-size: 16px; font-weight: bold; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); z-index: 20; }
        .title { font-size: 32px; font-weight: 900; color: #6f6; text-shadow: 0 0 20px #6f6; margin-bottom: 15px; }
        .subtitle { color: #88a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #6f6 0%, #4a4 100%); border: none; padding: 12px 35px; font-size: 16px; font-weight: bold; color: #000; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui"><div class="score-box"><span>得分: <b id="score">0</b></span></div></div>
        <div id="startScreen">
            <div class="title">🚁 直升机</div>
            <div class="subtitle">按住飞行松手下降<br>躲避障碍和火墙<br>坚持越久得分越高</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let w, h, score = 0, gameRunning = false;
        let player = { x: 0, y: 0, vy: 0 }, obstacles = [], walls = [], flying = false;

        function resize() { const c = document.getElementById('gameContainer'); w = c.clientWidth; h = c.clientHeight; canvas.width = w; canvas.height = h; }
        function init() { resize(); player = { x: w/3, y: h/2, vy: 0 }; obstacles = []; walls = []; score = 0; flying = false; document.getElementById('score').textContent = 0; for (let i = 0; i < 5; i++) { walls.push({ x: w + i * 150, gap: 150 + Math.random() * 100 }); } }

        function update() {
            if (!gameRunning) return;
            if (flying) player.vy -= 0.5; else player.vy += 0.3;
            player.vy = Math.max(-8, Math.min(8, player.vy));
            player.y += player.vy;
            if (player.y < 20) player.y = 20;
            if (player.y > h - 20) gameOver();
            score++; document.getElementById('score').textContent = score;
            walls.forEach(wall => { wall.x -= 3; if (wall.x < -50) { wall.x = w + 100; wall.gap = 120 + Math.random() * 100; } });
            walls.forEach(wall => { if (player.x + 15 > wall.x - 10 && player.x - 15 < wall.x + 10 && (player.y - 15 < wall.y - wall.gap/2 || player.y + 15 > wall.y + wall.gap/2)) gameOver(); });
            draw(); requestAnimationFrame(update);
        }

        function draw() { ctx.fillStyle = '#051005'; ctx.fillRect(0, 0, w, h); ctx.fillStyle = '#2a5a2a'; for (let i = 0; i < 20; i++) { const x = (score * 3 + i * 50) % (w + 100) - 50; ctx.fillRect(x, 0, 2, h); } ctx.fillStyle = '#6f6'; ctx.beginPath(); ctx.moveTo(player.x - 15, player.y); ctx.lineTo(player.x + 15, player.y); ctx.lineTo(player.x + 10, player.y - 10); ctx.lineTo(player.x - 10, player.y - 10); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#4a4'; ctx.fillRect(player.x - 20, player.y - 5, 5, 10); ctx.fillRect(player.x + 15, player.y - 5, 5, 10); ctx.fillStyle = '#8b8'; walls.forEach(wall => { ctx.fillRect(wall.x, 0, 15, wall.y - wall.gap/2); ctx.fillRect(wall.x, wall.y + wall.gap/2, 15, h); }); }

        function gameOver() { gameRunning = false; alert('游戏结束! 得分: ' + score); document.getElementById('startScreen').style.display = 'flex'; }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } flying = true; });
        c.addEventListener('touchend', () => flying = false);
        c.addEventListener('mousedown', () => { if (!gameRunning) { gameRunning = true; document.getElementById('startScreen').style.display = 'none'; init(); update(); } flying = true; });
        c.addEventListener('mouseup', () => flying = false);
        init();
    </script>
</body>
</html>
