<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>躲避球</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: #1a1a2e; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; }
        #gameContainer { width: 100%; height: 100%; max-width: 428px; position: relative; background: #0f0f1a; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(255,100,100,0.2); border: 2px solid #f66; border-radius: 8px; padding: 8px 15px; }
        .score-box span { color: #f88; font-size: 18px; font-weight: bold; }
        .hp-box { background: rgba(100,255,100,0.2); border: 2px solid #6f6; border-radius: 8px; padding: 8px 15px; }
        .hp-box span { color: #8f8; font-size: 18px; font-weight: bold; }
        #startScreen, #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15,15,26,0.97); z-index: 20; }
        #gameOverScreen { display: none; }
        .title { font-size: 32px; font-weight: 900; color: #f66; text-shadow: 0 0 20px #f66; margin-bottom: 15px; }
        .subtitle { color: #88a; font-size: 13px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
        .btn { background: linear-gradient(135deg, #f66 0%, #d44 100%); border: none; padding: 14px 40px; font-size: 18px; font-weight: bold; color: #fff; border-radius: 25px; cursor: pointer; box-shadow: 0 0 20px rgba(255,100,100,0.5); }
        .final-score { font-size: 22px; color: #ff0; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box"><span>得分: <b id="score">0</b></span></div>
            <div class="hp-box"><span>生命: <b id="hp">100</b>%</span></div>
        </div>
        <div id="startScreen">
            <div class="title">躲避球</div>
            <div class="subtitle">点击或滑动躲避红色球<br>坚持时间越长得分越高<br>被击中扣血</div>
            <button class="btn" id="startBtn">开始</button>
        </div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, score = 0, hp = 100, gameRunning = false;
        let player, balls = [], particles = [], lastTime = 0, spawnTimer = 0;

        function resize() {
            const c = document.getElementById('gameContainer');
            width = c.clientWidth; height = c.clientHeight;
            canvas.width = width; canvas.height = height;
        }

        function init() {
            resize(); window.addEventListener('resize', resize);
            player = { x: width/2, y: height - 100, r: 20 };
            balls = []; particles = []; score = 0; hp = 100; spawnTimer = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('hp').textContent = 100;
        }

        function spawnBall() {
            const angle = Math.random() * Math.PI - Math.PI/2;
            const speed = 3 + Math.random() * 3 + score * 0.001;
            balls.push({
                x: Math.random() * width,
                y: -20,
                vx: Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1) * 0.5,
                vy: Math.sin(angle) * speed,
                r: 15 + Math.random() * 15,
                color: Math.random() > 0.8 ? '#ff0' : '#f66'
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 3;
                particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
            }
        }

        function update(t) {
            if (!gameRunning) return;
            if (t - lastTime > 100) { lastTime = t; return; }
            
            score++;
            document.getElementById('score').textContent = score;
            
            spawnTimer++;
            if (spawnTimer > Math.max(20, 50 - score * 0.01)) { spawnTimer = 0; spawnBall(); }
            
            balls.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < b.r || b.x > width - b.r) b.vx *= -1;
                
                const dx = player.x - b.x, dy = player.y - b.y;
                if (Math.sqrt(dx*dx + dy*dy) < player.r + b.r) {
                    hp -= 20;
                    createParticles(b.x, b.y, b.color);
                    balls.splice(i, 1);
                    document.getElementById('hp').textContent = hp;
                    if (hp <= 0) { gameOver(); }
                }
                
                if (b.y > height + 50) balls.splice(i, 1);
            });
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            });
            
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a'; ctx.fillRect(0, 0, width, height);
            
            balls.forEach(b => {
                ctx.fillStyle = b.color; ctx.shadowColor = b.color; ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            });
            ctx.shadowBlur = 0;
            
            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4*p.life, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            ctx.fillStyle = '#0f8'; ctx.shadowColor = '#0f8'; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true; init(); lastTime = performance.now(); requestAnimationFrame(update);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        const c = document.getElementById('gameContainer');
        c.addEventListener('touchstart', e => { if (!gameRunning) startGame(); player.x = e.touches[0].clientX; });
        c.addEventListener('touchmove', e => { if (gameRunning) player.x = e.touches[0].clientX; });
        c.addEventListener('mousemove', e => { if (gameRunning) player.x = e.clientX; });
        c.addEventListener('click', () => { if (!gameRunning && document.getElementById('startScreen').style.display !== 'none') startGame(); });
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('restartBtn').onclick = startGame;
        init();
    </script>
</body>
</html>
