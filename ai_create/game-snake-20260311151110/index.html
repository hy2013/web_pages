<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            max-width: 428px;
            position: relative;
            background: #0f0f1a;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .score-box {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #0f8848;
            border-radius: 8px;
            padding: 8px 16px;
        }

        .score-box span {
            color: #0f8;
            font-size: 20px;
            font-weight: bold;
        }

        .level-box {
            background: rgba(255, 136, 0, 0.2);
            border: 2px solid #ff8800;
            border-radius: 8px;
            padding: 8px 16px;
        }

        .level-box span {
            color: #ff8800;
            font-size: 20px;
            font-weight: bold;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 15, 26, 0.97);
            z-index: 20;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            color: #0f8;
            text-shadow: 0 0 20px #0f8;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        .btn {
            background: linear-gradient(135deg, #0f8 0%, #0a6 100%);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .final-score {
            font-size: 24px;
            color: #ff8800;
            margin: 15px 0;
        }

        .tap-hint {
            position: absolute;
            bottom: 60px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .control-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-box">
                <span>得分: <b id="score">0</b></span>
            </div>
            <div class="level-box">
                <span>等级: <b id="level">1</b></span>
            </div>
        </div>
        <div id="startScreen">
            <div class="title">贪吃蛇大作战</div>
            <div class="subtitle">
                上下左右滑动控制方向<br>
                吃到食物变长并得分<br>
                撞墙或撞自己游戏结束
            </div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div class="tap-hint">点击开始</div>
            <div class="control-hint">支持滑动手势</div>
        </div>
        <div id="gameOverScreen">
            <div class="title">游戏结束</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="btn" id="restartBtn">再来一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, gridSize, cellSize;
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let snake, food, direction, nextDirection;
        let gameLoop;
        let lastTouchX, lastTouchY;

        function resize() {
            const container = document.getElementById('gameContainer');
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            
            gridSize = 20;
            cellSize = Math.floor(Math.min(width, height - 60) / gridSize);
        }

        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            snake = [];
            for (let i = 0; i < 3; i++) {
                snake.push({ x: 5 + i, y: 10 });
            }
            
            direction = { x: -1, y: 0 };
            nextDirection = { x: -1, y: 0 };
            
            score = 0;
            level = 1;
            
            spawnFood();
            updateUI();
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }

        function update() {
            if (!gameRunning) return;

            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                
                if (score >= level * 100) {
                    level++;
                }
                
                spawnFood();
                updateUI();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, gridSize * cellSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(gridSize * cellSize, i * cellSize);
                ctx.stroke();
            }

            const offsetX = (width - gridSize * cellSize) / 2;
            const offsetY = (height - gridSize * cellSize) / 2;

            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                offsetX + food.x * cellSize + cellSize / 2,
                offsetY + food.y * cellSize + cellSize / 2,
                cellSize / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            snake.forEach((seg, i) => {
                const gradient = ctx.createRadialGradient(
                    offsetX + seg.x * cellSize + cellSize / 2,
                    offsetY + seg.y * cellSize + cellSize / 2,
                    0,
                    offsetX + seg.x * cellSize + cellSize / 2,
                    offsetY + seg.y * cellSize + cellSize / 2,
                    cellSize / 2
                );
                
                if (i === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00aa55');
                } else {
                    const ratio = 1 - i / snake.length;
                    gradient.addColorStop(0, `rgb(0, ${Math.floor(200 + 55 * ratio)}, ${Math.floor(100 + 55 * ratio)})`);
                    gradient.addColorStop(1, `rgb(0, ${Math.floor(150 + 55 * ratio)}, ${Math.floor(80 + 55 * ratio)})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    offsetX + seg.x * cellSize + 1,
                    offsetY + seg.y * cellSize + 1,
                    cellSize - 2,
                    cellSize - 2
                );
            });
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            init();
            
            const speed = Math.max(80, 150 - level * 10);
            gameLoop = setInterval(update, speed);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function handleSwipe(dx, dy) {
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (dx < -30 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                if (dy > 30 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                } else if (dy < -30 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        const container = document.getElementById('gameContainer');
        
        container.addEventListener('touchstart', (e) => {
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        });

        container.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            
            const dx = e.changedTouches[0].clientX - lastTouchX;
            const dy = e.changedTouches[0].clientY - lastTouchY;
            handleSwipe(dx, dy);
        });

        container.addEventListener('click', (e) => {
            if (!gameRunning) return;
            
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = width / 2;
            const centerY = height / 2;
            const dx = x - centerX;
            const dy = y - centerY;
            
            handleSwipe(dx * 2, dy * 2);
        });

        init();
    </script>
</body>
</html>
